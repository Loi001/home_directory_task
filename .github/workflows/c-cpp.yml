name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install
        run: make install

      - name: Build
        run: make build

      # - name: Lint
      #   run: make lint

      # - name: Test
      #   run: make test
